services:
  app:
    build: .
    network_mode: "service:tailscale"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/roadmap.db
    restart: unless-stopped
    depends_on:
      - tailscale
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
  tailscale:
    image: tailscale/tailscale:latest
    container_name: app-dev-roadmap
    hostname: app-dev-roadmap
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
      - TS_EXTRA_ARGS=--accept-dns=false
    cap_add:
      - NET_ADMIN
      - SYS_MODULE 
    restart: unless-stopped


