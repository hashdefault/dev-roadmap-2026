services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: npx nuxt dev --host 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - ./data:/app/data
    environment:
      - NODE_ENV=development
      - DB_PATH=/app/data/roadmap.db
